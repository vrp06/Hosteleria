<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Header + Sidebar Joviat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="topbar">
      <button
        id="menu-toggle"
        class="menu-toggle"
        aria-label="Abrir menú lateral"
        aria-controls="sidebar"
        aria-expanded="false"
      >
        <span></span>
        <span></span>
        <span></span>
      </button>

      <a href="#" class="logo-link" aria-label="Inicio">
        <img src="logo_joviat.svg" alt="logo_joviat" class="logo" />
      </a>
    </header>

    <aside id="sidebar" class="sidebar" aria-hidden="true">
      <nav>
        <ul>
          <li><a href="#">Inicio</a></li>
          <li><a href="#">Reservas</a></li>
          <li><a href="#">Habitaciones</a></li>
          <li><a href="#">Contacto</a></li>
        </ul>
      </nav>
    </aside>

    <div id="backdrop" class="backdrop" hidden></div>

    <main class="content">
      <h1>Diseño adaptable para mobile y PC</h1>
      <p>
        Usa el icono de menú para abrir o cerrar la barra lateral. En pantallas
        grandes la barra aparece fija automáticamente.
      </p>
    </main>

    <script src="script.js"></script>
  </body>
</html>
